<style>
:root {
  --sand: #F5E6D3; --sand-light: #FBF6EF; --gold: #C8A24D; --gold-dark: #A07828;
  --coral: #D4726A; --coral-light: #F9E4E2; --ocean: #2C7A8C; --ocean-light: #E8F4F7;
  --ocean-dark: #1A5C6B; --temple: #8B4513; --temple-light: #FDF5EB;
  --night: #1C1B1F; --text: #2C2416; --text-soft: #6B5E4A; --text-light: #9B8E7A;
  --white: #FFFFFF; --border: rgba(0,0,0,0.06);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04); --shadow-md: 0 4px 24px rgba(0,0,0,0.06);
  --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Noto Sans SC', system-ui, sans-serif;
  background: var(--sand-light); color: var(--text); line-height: 1.6;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}

/* ── Hero ── */
.hero {
  position: relative; background: linear-gradient(160deg, #1A3A4A 0%, #0F2835 30%, #2C7A8C 60%, #1A5C6B 100%);
  padding: 40px 20px 56px; text-align: center; overflow: hidden; isolation: isolate;
}
.hero::before {
  content: ''; position: absolute; inset: 0; z-index:0;
  background: radial-gradient(ellipse 80% 60% at 20% 80%, rgba(200,162,77,0.18) 0%, transparent 60%),
              radial-gradient(ellipse 60% 50% at 85% 20%, rgba(212,114,106,0.12) 0%, transparent 60%);
}
.hero-pattern { position:absolute; inset:0; opacity:0.05; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 15 L45 15 L37 22 L40 32 L30 26 L20 32 L23 22 L15 15 L25 15 Z' fill='white'/%3E%3C/svg%3E");
  background-size: 40px 40px;
}
.hero-content { position:relative; z-index:1; }
.hero-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.1); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.12); border-radius:100px; padding:5px 16px; font-size:12px; color:rgba(255,255,255,0.85); letter-spacing:0.04em; margin-bottom:18px; }
.hero h1 { font-family:'Noto Serif SC',serif; font-size:clamp(26px,5vw,38px); font-weight:900; color:var(--white); line-height:1.25; margin-bottom:4px; }
.hero .subtitle { font-size:13px; color:rgba(255,255,255,0.55); font-weight:300; letter-spacing:0.06em; }
.countdown-row { display:flex; justify-content:center; gap:16px; margin-top:20px; flex-wrap:wrap; }
.countdown-item { text-align:center; }
.countdown-num { font-size:28px; font-weight:700; color:var(--gold); font-family:'Noto Serif SC',serif; }
.countdown-label { font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:0.05em; text-transform:uppercase; }
.hero-wave { position:absolute; bottom:-2px; left:0; right:0; z-index:2; }
.hero-wave svg { display:block; width:100%; height:auto; }

/* ── Tab Nav ── */
.tab-bar {
  position: sticky; top:0; z-index:100;
  display:flex; background:rgba(251,246,239,0.9); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.tab-btn {
  flex:1; padding:14px 8px; border:none; background:none; font-family:inherit; font-size:13px; font-weight:500;
  color:var(--text-soft); cursor:pointer; transition:all 0.2s; position:relative; text-align:center;
}
.tab-btn.active { color:var(--ocean); }
.tab-btn.active::after { content:''; position:absolute; bottom:0; left:20%; right:20%; height:3px; background:var(--ocean); border-radius:2px 2px 0 0; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ── Quick Nav ── */
.quick-nav { display:flex; gap:4px; padding:10px 16px; overflow-x:auto; scrollbar-width:none; }
.quick-nav::-webkit-scrollbar { display:none; }
.quick-nav button {
  flex-shrink:0; font-family:inherit; font-size:11px; font-weight:500; padding:5px 14px;
  border-radius:100px; border:1px solid var(--border); background:var(--white); color:var(--text-soft); cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.quick-nav button:hover, .quick-nav button.active { background:var(--ocean); color:white; border-color:var(--ocean); }

/* ── Container ── */
.container { max-width:680px; margin:0 auto; padding:0 16px 80px; }

/* ── Region ── */
.region-header { margin:28px 0 16px; }
.section-title { font-family:'Noto Serif SC',serif; font-size:18px; font-weight:700; display:flex; align-items:center; gap:10px; }
.section-title .icon { width:32px; height:32px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:16px; }
.section-title .icon.phuket { background:var(--ocean-light); }
.section-title .icon.bangkok { background:var(--temple-light); }

/* ── Day Card ── */
.day-card { background:var(--white); border-radius:var(--radius-lg); margin-bottom:12px; overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--border); transition:box-shadow 0.3s; }
.day-card:hover { box-shadow:var(--shadow-md); }
.day-header { display:flex; align-items:center; gap:12px; padding:16px; cursor:pointer; user-select:none; transition:background 0.2s; }
.day-header:active { background:rgba(0,0,0,0.02); }
.day-num { width:40px; height:40px; border-radius:var(--radius-sm); display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; color:white; font-size:10px; line-height:1.1; }
.day-num .num { font-size:18px; font-family:'Noto Serif SC',serif; }
.day-num.phuket-day { background:var(--ocean); }
.day-num.bangkok-day { background:var(--temple); }
.day-info { flex:1; min-width:0; }
.day-info h3 { font-size:15px; font-weight:600; line-height:1.3; }
.day-info .day-meta { font-size:11px; color:var(--text-soft); margin-top:2px; }
.day-arrow { flex-shrink:0; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.04); transition:transform 0.3s; font-size:11px; color:var(--text-soft); }
.day-card.open .day-arrow { transform:rotate(180deg); background:var(--ocean); color:white; }
.day-body { max-height:0; overflow:hidden; transition:max-height 0.45s cubic-bezier(0.25,0.46,0.45,0.94); }
.day-card.open .day-body { max-height:3000px; }
.day-body-inner { padding:0 16px 18px; }

/* ── Action Bar ── */
.action-bar { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.action-btn {
  display:inline-flex; align-items:center; gap:4px; padding:5px 10px; border-radius:100px; border:1px solid var(--border);
  font-size:11px; font-weight:500; cursor:pointer; text-decoration:none; transition:all 0.2s; background:var(--white); color:var(--text-soft);
}
.action-btn.maps { color:#4285F4; border-color:rgba(66,133,244,0.2); }
.action-btn.maps:hover { background:#4285F4; color:white; }
.action-btn.xhs { color:#FF2442; border-color:rgba(255,36,66,0.2); }
.action-btn.xhs:hover { background:#FF2442; color:white; }

/* ── Timeline ── */
.timeline { position:relative; padding-left:22px; }
.timeline::before { content:''; position:absolute; left:7px; top:4px; bottom:4px; width:2px; background:linear-gradient(180deg,var(--ocean),var(--coral),var(--gold)); border-radius:1px; }
.timeline-item { position:relative; padding-bottom:12px; }
.timeline-item:last-child { padding-bottom:0; }
.timeline-dot { position:absolute; left:-18px; top:5px; width:9px; height:9px; border-radius:50%; background:white; border:2px solid var(--ocean); z-index:1; }
.timeline-item.activity .timeline-dot { border-color:var(--coral); background:var(--coral-light); }
.timeline-item.transport .timeline-dot { border-color:var(--gold); background:var(--sand); }
.timeline-time { font-size:11px; font-weight:600; color:var(--ocean); letter-spacing:0.02em; margin-bottom:1px; }
.timeline-item.activity .timeline-time { color:var(--coral); }
.timeline-item.transport .timeline-time { color:var(--gold-dark); }
.timeline-text { font-size:13px; font-weight:500; }

/* ── Resto ── */
.resto-block { margin-top:10px; padding:10px 14px; border-radius:var(--radius-md); }
.resto-block.lunch { background:#FFF9F0; border:1px solid rgba(200,162,77,0.12); }
.resto-block.dinner { background:#FDF5F5; border:1px solid rgba(212,114,106,0.1); }
.resto-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
.resto-label.lunch { color:var(--gold-dark); }
.resto-label.dinner { color:var(--coral); }
.resto-list { display:flex; flex-wrap:wrap; gap:5px; }
.resto-tag { font-size:11px; padding:3px 10px; border-radius:100px; font-weight:500; white-space:nowrap; }
.resto-tag.lunch { background:rgba(200,162,77,0.1); color:#8B6914; }
.resto-tag.dinner { background:rgba(212,114,106,0.1); color:#A04A42; }
.resto-tag a { color:inherit; text-decoration:none; }
.resto-tag a:hover { text-decoration:underline; }

/* ── Map Panel ── */
#map { width:100%; height:calc(100vh - 120px); border-radius:var(--radius-md); z-index:1; }
.map-legend { display:flex; gap:12px; padding:12px 16px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-soft); }
.legend-dot { width:10px; height:10px; border-radius:50%; }
.legend-dot.phuket { background:var(--ocean); }
.legend-dot.bangkok { background:var(--temple); }
.legend-dot.transport { background:var(--gold); }

/* ── Checklist Panel ── */
.checklist-section { margin-bottom:24px; }
.checklist-section h3 { font-family:'Noto Serif SC',serif; font-size:16px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.checklist-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--white); border-radius:var(--radius-sm); margin-bottom:6px; border:1px solid var(--border); cursor:pointer; transition:all 0.2s; }
.checklist-item:hover { background:var(--ocean-light); }
.checklist-item .cb { width:20px; height:20px; border-radius:50%; border:2px solid #ccc; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; font-size:11px; color:transparent; }
.checklist-item.checked .cb { background:var(--ocean); border-color:var(--ocean); color:white; }
.checklist-item.checked .cl-text { text-decoration:line-through; color:var(--text-light); }
.cl-text { font-size:13px; flex:1; }

/* ── Weather ── */
.weather-card { background:var(--white); border-radius:var(--radius-lg); padding:16px; margin-bottom:16px; border:1px solid var(--border); text-align:center; }
.weather-card h3 { font-size:14px; margin-bottom:12px; color:var(--text-soft); }
.weather-grid { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; }
.weather-day { flex-shrink:0; width:70px; text-align:center; padding:10px 6px; border-radius:var(--radius-sm); background:var(--sand-light); }
.weather-day .day-label { font-size:10px; color:var(--text-soft); margin-bottom:4px; }
.weather-day .temp { font-size:14px; font-weight:700; }

/* ── Summary ── */
.summary-section { margin-top:40px; }
.summary-section h2 { font-family:'Noto Serif SC',serif; font-size:20px; font-weight:700; margin-bottom:20px; text-align:center; }
.resto-category { margin-bottom:16px; }
.resto-category h4 { font-size:13px; font-weight:600; margin-bottom:8px; }
.resto-category .resto-list { gap:6px; }
.resto-tag.summary { background:rgba(44,122,140,0.07); color:var(--ocean-dark); font-size:12px; padding:4px 12px; }

/* ── Footer ── */
.footer { text-align:center; padding:40px 16px; color:var(--text-light); font-size:12px; }

/* ── Animations ── */
@keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.day-card { animation:fadeInUp 0.4s ease both; }
.day-card:nth-child(1){animation-delay:0.03s} .day-card:nth-child(2){animation-delay:0.06s}
.day-card:nth-child(3){animation-delay:0.09s} .day-card:nth-child(4){animation-delay:0.12s}
.day-card:nth-child(5){animation-delay:0.15s} .day-card:nth-child(6){animation-delay:0.18s}
.day-card:nth-child(7){animation-delay:0.21s} .day-card:nth-child(8){animation-delay:0.24s}
.day-card:nth-child(9){animation-delay:0.27s} .day-card:nth-child(10){animation-delay:0.30s}
.day-card:nth-child(11){animation-delay:0.33s}

@media (min-width:768px) { .container { padding:0 28px 100px; } .hero { padding:56px 32px 72px; } }
@media print { .tab-bar,.hero-wave,.map-container,.action-btn { display:none; } .day-body { max-height:none!important; } }
</style>
</head>

// ═══ XHS link helper ═══
function xhsLink(keyword) {
  return 'https://www.xiaohongshu.com/search_result?keyword=' + encodeURIComponent(keyword + ' 泰国 攻略 推荐');
}
function gmapsLink(keyword) {
  return 'https://www.google.com/maps/search/' + encodeURIComponent(keyword + ' Thailand');
}

// ═══ Build Schedule ═══
function buildSchedule() {
  let html = '';
  let currentRegion = '';
  let navHtml = '';

  DAYS.forEach((d, i) => {
    if (d.region !== currentRegion) {
      currentRegion = d.region;
      const icon = d.region === 'phuket' ? '&#x1F3DD;' : '&#x1F6D5;';
      const cls = d.region === 'phuket' ? 'phuket' : 'bangkok';
      html += `<div class="region-header"><div class="section-title"><span class="icon ${cls}">${icon}</span>${d.region==='phuket'?'普吉岛 · Phuket':'曼谷 · Bangkok'}</div></div>`;
    }

    const numCls = d.region === 'phuket' ? 'phuket-day' : 'bangkok-day';
    navHtml += `<button onclick="scrollToDay('${d.id}')" class="${d.region==='bangkok'?'bangkok-nav':''}">Day ${d.num}</button>`;

    const tl = d.timeline.map(t => {
      let tClass = t.type || '';
      if (t.type === 'activity') tClass = 'activity';
      else if (t.type === 'transport') tClass = 'transport';
      return `<div class="timeline-item ${tClass}"><div class="timeline-dot"></div><div class="timeline-time">${t.time}</div><div class="timeline-text">${t.text}</div></div>`;
    }).join('');

    // Actions: Google Maps + XHS for the day
    const dayKeyword = d.key ? d.key[0] : d.title;
    const actions = `<div class="action-bar">
      <a href="${gmapsLink(d.key ? d.key.join('+') : d.title)}" target="_blank" rel="noopener" class="action-btn maps">&#x1F4CD; Google Maps</a>
      <a href="${xhsLink(dayKeyword)}" target="_blank" rel="noopener" class="action-btn xhs">&#x1F516; 小红书攻略</a>
    </div>`;

    const lunchTags = d.lunch.map(r => `<span class="resto-tag lunch"><a href="${xhsLink(r)}" target="_blank" rel="noopener">${r}</a></span>`).join('');
    const dinnerTags = d.dinner.map(r => `<span class="resto-tag dinner"><a href="${xhsLink(r)}" target="_blank" rel="noopener">${r}</a></span>`).join('');

    html += `<div class="day-card open" id="${d.id}">
      <div class="day-header" onclick="toggleDay(this)">
        <div class="day-num ${numCls}"><span class="num">${d.num}</span>DAY</div>
        <div class="day-info"><h3>${d.title}</h3><div class="day-meta">${d.date} ${d.region==='phuket'?'· 普吉':'· 曼谷'}</div></div>
        <div class="day-arrow">&#x25BC;</div>
      </div>
      <div class="day-body">
        <div class="day-body-inner">
          ${actions}
          <div class="timeline">${tl}</div>
          <div class="resto-block lunch"><div class="resto-label lunch">午餐</div><div class="resto-list">${lunchTags}</div></div>
          <div class="resto-block dinner"><div class="resto-label dinner">晚餐</div><div class="resto-list">${dinnerTags}</div></div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('scheduleContainer').innerHTML = html;
  document.getElementById('quickNav').innerHTML = navHtml;
}

// ═══ Checklist ═══
function buildChecklist() {
  const categories = {
    '&#x1F4CB; 证件类': ['护照（有效期6个月以上）','身份证','机票行程单（打印+电子）','酒店预订单（打印+电子）','潜水证（AOW学员记录）','旅行保险单','2寸证件照（备用）'],
    '&#x1F4B0; 资金类': ['泰铢现金（建议1-2万铢）','人民币现金','Visa/Mastercard 信用卡','银联借记卡','零钱包（夜市必备）'],
    '&#x1F4F1; 电子类': ['手机 + 充电器','充电宝（≤20000mAh）','泰国SIM卡/国际漫游','防水手机袋','GoPro/水下相机','转换插头（泰国两脚扁插）'],
    '&#x1F3D6; 海岛装备': ['泳衣（2-3套轮换）','防晒衣/水母衣','浮潜面镜+呼吸管','潜水袜/涉水鞋','速干毛巾','防水背包/防水袋'],
    '&#x1F484; 个护类': ['高倍防晒霜（SPF50+）','晒后修复芦荟胶','驱蚊液','个人洗漱用品','常用药品（晕船药/肠胃药/创可贴）'],
    '&#x1F454; 衣物类': ['轻薄夏装（速干为佳）','寺庙着装（过膝裤/裙+有袖上衣）','薄外套（飞机/商场冷气）','拖鞋+运动鞋'],
  };
  let html = '<h2 style="font-family:\'Noto Serif SC\',serif;font-size:22px;text-align:center;margin:24px 0 20px;">&#x2705; 行前准备清单</h2>';
  for (const [cat, items] of Object.entries(categories)) {
    html += `<div class="checklist-section"><h3>${cat}</h3>`;
    items.forEach(item => {
      html += `<div class="checklist-item" onclick="this.classList.toggle('checked')"><span class="cb">&#x2713;</span><span class="cl-text">${item}</span></div>`;
    });
    html += `</div>`;
  }
  document.getElementById('checklistContainer').innerHTML = html;
}

// ═══ Summary ═══
function buildSummary() {
  const cats = [
    ['普吉 · 午餐', PHUKET_LUNCH],
    ['普吉 · 晚餐', PHUKET_DINNER],
    ['曼谷 · 午餐', BKK_LUNCH],
    ['曼谷 · 晚餐', BKK_DINNER],
  ];
  let html = '<div class="summary-section"><h2>餐厅汇总</h2>';
  cats.forEach(([title, items]) => {
    const tags = items.map(r => `<span class="resto-tag summary"><a href="${xhsLink(r)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">${r}</a></span>`).join('');
    html += `<div class="resto-category"><h4>${title}</h4><div class="resto-list">${tags}</div></div>`;
  });
  html += '</div>';
  document.getElementById('summaryContainer').innerHTML = html;
}

// ═══ Map ═══
let map;
function initMap() {
  map = L.map('map').setView([11.5, 99.5], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 18
  }).addTo(map);

  const markers = [];
  const phuketIcon = L.divIcon({html:'<div style="width:14px;height:14px;border-radius:50%;background:#2C7A8C;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2);"></div>',iconSize:[14,14],iconAnchor:[7,7]});
  const bkkIcon = L.divIcon({html:'<div style="width:14px;height:14px;border-radius:50%;background:#8B4513;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2);"></div>',iconSize:[14,14],iconAnchor:[7,7]});
  const transportIcon = L.divIcon({html:'<div style="width:14px;height:14px;border-radius:50%;background:#C8A24D;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2);"></div>',iconSize:[14,14],iconAnchor:[7,7]});

  const bounds = [];
  DAYS.forEach(d => {
    d.timeline.forEach(t => {
      if (t.lat && t.lng) {
        const key = `${t.lat.toFixed(4)},${t.lng.toFixed(4)}`;
        if (!markers.find(m => m.key === key)) {
          let icon;
          if (t.type === 'transport') icon = transportIcon;
          else if (d.region === 'bangkok') icon = bkkIcon;
          else icon = phuketIcon;

          const marker = L.marker([t.lat, t.lng], {icon})
            .bindPopup(`<b>Day ${d.num}</b><br>${t.text}<br><a href="${gmapsLink(t.text)}" target="_blank">Google Maps &#x2197;</a>`)
            .addTo(map);
          markers.push({key, marker});
          bounds.push([t.lat, t.lng]);
        }
      }
    });
  });

  if (bounds.length) map.fitBounds(bounds, {padding:[30,30]});
}

// ═══ Tab Switch ═══
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const panels = ['schedule','map','checklist','summary'];
    b.classList.toggle('active', panels[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'map') { setTimeout(() => { if (map) map.invalidateSize(); }, 100); }
}

// ═══ Helpers ═══
function toggleDay(header) { header.parentElement.classList.toggle('open'); }
function scrollToDay(id) {
  const el = document.getElementById(id); if (!el) return;
  const top = el.getBoundingClientRect().top + window.pageYOffset - 100;
  window.scrollTo({top, behavior:'smooth'});
  if (!el.classList.contains('open')) el.classList.add('open');
}

// ═══ Countdown ═══
function updateCountdown() {
  const target = new Date('2026-09-25T00:00:00+07:00');
  const now = new Date();
  const diff = target - now;
  if (diff <= 0) { document.getElementById('countdown').innerHTML = '<span style="color:rgba(255,255,255,0.7);">&#x2708; 旅途进行中！</span>'; return; }
  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById('countdown').innerHTML = `
    <div class="countdown-item"><div class="countdown-num">${d}</div><div class="countdown-label">天</div></div>
    <div class="countdown-item"><div class="countdown-num">${h}</div><div class="countdown-label">时</div></div>
    <div class="countdown-item"><div class="countdown-num">${m}</div><div class="countdown-label">分</div></div>`;
}
setInterval(updateCountdown, 60000);

// ═══ Init ═══
buildSchedule();
buildChecklist();
buildSummary();
updateCountdown();

// Map init when tab clicked
document.querySelectorAll('.tab-btn')[1].addEventListener('click', function() {
  if (!map) initMap();
  else setTimeout(() => map.invalidateSize(), 100);
});
</script>
